name: Refresh winter conditions data

# Daily snapshot for the homepage winter conditions panel. This site is a
# single Cloudflare Worker (wrangler deploy, no Pages git integration), so
# refreshing the data requires an actual `wrangler deploy`, not just a
# commit. If the fetch fails, fetch-weather.js still writes an all-fallback
# snapshot, so the panel degrades to plain source links rather than showing
# stale numbers.
#
# Requires a CLOUDFLARE_API_TOKEN repo secret (Workers Scripts: Edit
# permission) for the deploy step to run.
on:
  schedule:
    - cron: '0 17 * * *' # ~5am NZST / 6am NZDT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: node scripts/fetch-weather.js

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet -- src/data/winter-conditions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/winter-conditions.json
          git commit -m "chore: refresh winter conditions data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy
        if: steps.commit.outputs.changed == 'true'
        run: npx astro build && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
