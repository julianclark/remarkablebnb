name = "remarkablebnb"
compatibility_date = "2026-07-14"
main = "./src/worker.ts"

[triggers]
crons = ["*/30 * * * *"]

[[routes]]
pattern = "remarkablebnb.nz"
custom_domain = true

[[routes]]
pattern = "remarkablebnb.co.nz"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "remarkablebnb"
database_id = "10874395-ab52-47f2-914f-380731049425"

[[kv_namespaces]]
binding = "GO_REDIRECTS"
id = "a73ee7444f254669b90c6b014a58c9ab"

# Enquiry notifications. Restricted to the verified Email Routing address so
# the endpoint can never be abused as an open relay.
[[send_email]]
name = "EMAIL"
destination_address = "clarkjj@gmail.com"
